<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheapBuilds || Login</title>
    <link rel="stylesheet" href="./css/style.css"> 
    <link rel="stylesheet" href="./css/login-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="./js/shared.js" defer></script>
    <script src="./js/login.js" defer></script>
</head>
<body>
    <header>
    <a href="./index.html" class="homePageHeader">CheapBuilds</a>
        <nav>
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li><a href="./product-listing.html">Products</a></li>
                <li><a href="./aboutpage.html">About</a></li>
                <li><a href="./profile.html">Account</a></li>
               
            </ul>
        </nav>

        <form action="#" method="GET">
            <label for="product-search"></label>
            <input type="search" id="product-search" name="q" placeholder="Search the products">
            <button type="submit">Search</button>
        </form>

        <div class="cart-wrapper">
            <a href="./cart.html"><i class="fas fa-cart-shopping fa-2x"></i></a>
            <span id="cart-count">0</span> <!-- dynamically changes with JS -->
            
        </div>

        <a href="./login.html"><i class="fa-solid fa-user fa-2x"></i></a> <!-- the fa-2x changes the icon size, feature from font awesome-->
    </header>
    



    <main>
        <div class="login-container">
            <h1> Login to CheapBuilds </h1>

            <form id="login-form">
                <input type="email" id="email" placeholder="Enter Email" required>
                <input type="password" id="password" placeholder="Enter Password" required>
                <button type="submit">Login</button>

                <a href="./register.html">No account? Register</a>
            </form>
        </div>
    </main>





    <footer>
        <div class="footer-container">
            <div class="footer-col">
                <h3>Categories</h3>
                <ul>
                    <li><a href="./product-listing.html?category=prebuilt-desktop">PreBuilt Gaming PCs</a></li>
                    <li><a href="./product-listing.html?category=gaming-laptop">Gaming Laptops</a></li>
                </ul>
            </div>

            <div class="footer-col">
                <h3>Contact us</h3>
                <p>support@cheapbuilds.com</p>
                <p>123-123-1234</p>
                <p>321 Rue Cheap, Montreal, QC</p>
            </div>

            <div class="footer-col">
                <h3>Newsletter and Socials</h3>

                <div class="newsletter-social">
                    <div class="newsletter">
                        <input type="email" placeholder="Enter your email">
                        <button>Subscribe</button>
                    </div>

                    <div class="socials">
                        <a href=""><i class="fab fa-facebook"></i></a>
                        <a href=""><i class="fab fa-x-twitter"></i></a>
                        <a href=""><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
